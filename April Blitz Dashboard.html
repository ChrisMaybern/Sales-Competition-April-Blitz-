<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>April Pipeline Blitz — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/themes/dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#0B1F14;--bgCard:#0F2A1B;--bgInput:#172E21;--border:#1E3D2B;--borderLight:#2A5038;--mint:#ECFFF5;--mintDim:rgba(236,255,245,0.7);--mintFaint:rgba(236,255,245,0.35);--mintGhost:rgba(236,255,245,0.12);--green:#22C55E;--greenDim:rgba(34,197,94,0.15);--amber:#F59E0B;--amberDim:rgba(245,158,11,0.15);--amberText:#FCD34D;--red:#EF4444;--redDim:rgba(239,68,68,0.12);--redText:#FCA5A5;--accent:#6ECBA0}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--mint);min-height:100vh}
.serif{font-family:'DM Serif Display',Georgia,serif}
.header{border-bottom:1px solid var(--border);padding:clamp(16px,2vw,28px) clamp(20px,3vw,48px);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.header-brand{font-size:clamp(9px,0.7vw,13px);text-transform:uppercase;letter-spacing:4px;font-weight:600;color:var(--mintFaint);margin-bottom:2px}
.header-title{font-size:clamp(22px,2.2vw,40px);font-weight:400}
.header-right{display:flex;align-items:center;gap:clamp(8px,1vw,16px);flex-wrap:wrap}
.phase-dot{width:clamp(7px,0.5vw,10px);height:clamp(7px,0.5vw,10px);border-radius:50%;display:inline-block}
.hdr-btn{padding:clamp(4px,0.4vw,8px) clamp(8px,0.8vw,16px);font-size:clamp(9px,0.65vw,12px);font-weight:700;text-transform:uppercase;letter-spacing:1px;border-radius:4px;cursor:pointer;font-family:inherit;border:1px solid}
.timeline-wrap{padding:clamp(12px,1.2vw,24px) clamp(20px,3vw,48px);border-bottom:1px solid var(--border)}
.timeline{display:flex;align-items:center}
.tl-node{text-align:center;flex:1;min-width:clamp(60px,6vw,100px)}
.tl-dot{width:clamp(10px,0.8vw,16px);height:clamp(10px,0.8vw,16px);border-radius:50%;margin:0 auto 6px}
.tl-date{font-size:clamp(9px,0.7vw,13px);font-weight:700}
.tl-label{font-size:clamp(8px,0.6vw,11px);color:var(--mintFaint);margin-top:1px}
.tl-line{height:1px;flex:1;min-width:10px}
.container{max-width:1800px;margin:0 auto;padding:clamp(16px,1.5vw,28px) clamp(20px,3vw,48px) 48px}
.kpi-strip{display:flex;gap:clamp(8px,0.8vw,16px);margin-bottom:clamp(16px,1.5vw,28px);flex-wrap:wrap}
.kpi{background:var(--bgCard);border:1px solid var(--border);border-radius:clamp(8px,0.6vw,14px);padding:clamp(12px,1.2vw,22px) clamp(14px,1.2vw,24px);flex:1;min-width:clamp(100px,12vw,180px);position:relative;overflow:hidden}
.kpi.big{padding:clamp(18px,1.5vw,30px) clamp(18px,1.5vw,32px);min-width:clamp(130px,14vw,220px)}
.kpi.glow{background:linear-gradient(135deg,var(--bgCard),#0D3520);border-color:var(--accent)}
.kpi-glow-orb{position:absolute;top:-30px;right:-30px;width:80px;height:80px;background:radial-gradient(circle,rgba(110,203,160,0.15),transparent);border-radius:50%}
.kpi-label{font-size:clamp(8px,0.6vw,12px);text-transform:uppercase;letter-spacing:2.5px;font-weight:600;color:var(--mintFaint);margin-bottom:4px}
.kpi-value{font-size:clamp(20px,2vw,38px);font-weight:800;line-height:1.1}
.kpi.big .kpi-value{font-size:clamp(26px,2.4vw,46px)}
.kpi.glow .kpi-value{color:var(--accent)}
.kpi-sub{font-size:clamp(9px,0.65vw,13px);color:var(--mintFaint);margin-top:3px}
.form-wrap{background:var(--bgCard);border:1px solid var(--border);border-radius:12px;padding:clamp(16px,1.5vw,28px) clamp(18px,1.5vw,30px);margin-bottom:clamp(16px,1.5vw,28px)}
.form-label{font-size:clamp(9px,0.65vw,12px);text-transform:uppercase;letter-spacing:2.5px;font-weight:700;color:var(--accent);margin-bottom:clamp(10px,1vw,18px)}
.form-row{display:flex;gap:clamp(6px,0.6vw,12px);flex-wrap:wrap;margin-bottom:clamp(8px,0.7vw,14px)}
.form-row:last-child{margin-bottom:0}
.inp,.sel{padding:clamp(8px,0.6vw,14px) clamp(10px,0.8vw,16px);font-size:clamp(12px,0.85vw,16px);border:1px solid var(--border);border-radius:6px;background:var(--bgInput);color:var(--mint);outline:none;flex:1;min-width:0;font-family:inherit}
.inp-wide{flex:2}
.btn-add{padding:clamp(8px,0.6vw,14px) clamp(18px,1.2vw,28px);background:var(--accent);color:var(--bg);border:none;border-radius:6px;font-size:clamp(11px,0.75vw,14px);font-weight:800;text-transform:uppercase;letter-spacing:1px;cursor:pointer;font-family:inherit;white-space:nowrap}
.ir-check{display:flex;align-items:center;gap:5px;font-size:clamp(11px,0.75vw,14px);color:var(--mintDim);cursor:pointer;white-space:nowrap}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);padding-bottom:2px;margin-bottom:clamp(16px,1.5vw,28px);flex-wrap:wrap}
.tab{padding:clamp(6px,0.6vw,12px) clamp(14px,1.2vw,26px);font-size:clamp(10px,0.75vw,14px);font-weight:500;text-transform:uppercase;letter-spacing:1.5px;border:none;cursor:pointer;border-radius:6px;background:transparent;color:var(--mintDim);font-family:inherit;transition:all 0.2s}
.tab.active{font-weight:700;background:var(--accent);color:var(--bg)}
.sec-label{font-size:clamp(9px,0.65vw,12px);text-transform:uppercase;letter-spacing:3px;font-weight:700;color:var(--accent);margin-bottom:clamp(10px,0.8vw,16px)}
.badge{display:inline-block;font-size:clamp(8px,0.6vw,11px);font-weight:700;text-transform:uppercase;letter-spacing:1.2px;padding:clamp(2px,0.2vw,5px) clamp(6px,0.5vw,12px);border-radius:4px;white-space:nowrap}
.pbar{border-radius:3px;overflow:hidden}
.pbar-fill{height:100%;border-radius:3px;transition:width 0.5s ease}
.sdr-row{display:flex;gap:clamp(12px,1vw,20px);flex-wrap:wrap}
.sdr-card{flex:1;min-width:clamp(280px,28vw,420px);background:var(--bgCard);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.sdr-head{padding:clamp(12px,1vw,20px) clamp(16px,1.2vw,24px);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.sdr-name{font-size:clamp(15px,1.2vw,22px);font-weight:700}
.sdr-body{padding:clamp(16px,1.2vw,24px)}
.sdr-stats{display:flex;gap:clamp(8px,0.6vw,14px);margin-bottom:clamp(14px,1.2vw,22px);text-align:center}
.sdr-stats>div{flex:1}
.stat-label{font-size:clamp(7px,0.55vw,11px);text-transform:uppercase;letter-spacing:2px;font-weight:600;color:var(--mintFaint)}
.stat-val{font-size:clamp(22px,1.8vw,38px);font-weight:800;line-height:1.2}
.pbar-label{display:flex;justify-content:space-between;margin-bottom:4px;font-size:clamp(9px,0.65vw,12px)}
.pbar-label span:first-child{color:var(--mintFaint);font-weight:500}
.pbar-label span:last-child{color:var(--mintDim);font-weight:600}
.sdr-hint{font-size:clamp(9px,0.65vw,12px);font-weight:500;padding:clamp(5px,0.4vw,8px) clamp(8px,0.7vw,14px);border-radius:6px;margin-top:clamp(8px,0.7vw,14px)}
.ae-stack{display:flex;flex-direction:column;gap:clamp(12px,1vw,20px)}
.ae-card{background:var(--bgCard);border-radius:12px;overflow:hidden;border:1px solid var(--border);position:relative}
.ae-card.winner{border:2px solid var(--green)}
.ae-winner-badge{position:absolute;top:0;right:0;background:var(--green);color:var(--bg);font-size:clamp(8px,0.6vw,11px);font-weight:800;text-transform:uppercase;letter-spacing:1.5px;padding:clamp(4px,0.3vw,7px) clamp(10px,0.8vw,18px);border-radius:0 10px 0 10px}
.ae-head{padding:clamp(12px,1vw,20px) clamp(16px,1.2vw,24px);border-bottom:1px solid var(--border);display:flex;gap:clamp(8px,0.6vw,14px);align-items:center;flex-wrap:wrap}
.ae-name{font-size:clamp(15px,1.2vw,22px);font-weight:700}
.ae-total{margin-left:auto;font-size:clamp(18px,1.5vw,28px);font-weight:800}
.ae-total small{font-size:clamp(10px,0.75vw,14px);font-weight:500;color:var(--mintFaint)}
.ae-body{padding:clamp(16px,1.2vw,24px);display:flex;gap:clamp(10px,0.8vw,18px);flex-wrap:wrap}
.ae-member{flex:1;min-width:clamp(220px,22vw,360px);background:var(--bg);border-radius:10px;padding:clamp(12px,1vw,20px)}
.ae-member-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:clamp(8px,0.6vw,14px)}
.ae-member-name{font-size:clamp(12px,0.9vw,16px);font-weight:700}
.ae-member-stats{display:flex;gap:clamp(12px,1vw,20px)}
.ae-member-stats .stat-val{font-size:clamp(18px,1.4vw,28px)}
.ae-balance-hint{font-size:clamp(8px,0.55vw,11px);color:var(--mintFaint);margin-top:3px}
.log-table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
.log-table{width:100%;border-collapse:collapse}
.log-table th{padding:clamp(8px,0.6vw,14px) clamp(10px,0.8vw,16px);text-align:left;font-size:clamp(8px,0.6vw,11px);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;color:var(--mintFaint);border-bottom:1px solid var(--border);background:var(--bgCard)}
.log-table td{padding:clamp(8px,0.6vw,14px) clamp(10px,0.8vw,16px);border-bottom:1px solid var(--border);font-size:clamp(11px,0.8vw,14px);color:var(--mintDim)}
.log-status{padding:clamp(3px,0.2vw,5px) clamp(5px,0.4vw,8px);font-size:clamp(9px,0.65vw,12px);font-weight:700;border-radius:4px;border:none;cursor:pointer;font-family:inherit}
.btn-del{background:none;border:none;color:var(--mintFaint);cursor:pointer;font-size:clamp(14px,1vw,20px);line-height:1;padding:2px 6px;border-radius:4px}
.empty-state{text-align:center;padding:clamp(32px,3vw,60px);color:var(--mintFaint);font-size:clamp(12px,0.85vw,15px)}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:999}
.modal{background:var(--bgCard);border:1px solid var(--border);border-radius:12px;padding:clamp(24px,2vw,40px);min-width:320px;max-width:clamp(380px,30vw,500px)}
.modal h3{font-size:clamp(13px,1vw,18px);font-weight:700;margin-bottom:16px;color:var(--mint)}
.modal .inp{width:100%;margin-bottom:12px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(12px,1vw,20px)}
.setting-card{background:var(--bgCard);border:1px solid var(--border);border-radius:10px;padding:clamp(14px,1.2vw,24px)}
.setting-card label{display:block;font-size:clamp(8px,0.6vw,11px);text-transform:uppercase;letter-spacing:2px;font-weight:600;color:var(--mintFaint);margin-bottom:6px}
.setting-card .inp{width:100%;flex:none}
.setting-card .hint{font-size:clamp(9px,0.65vw,12px);color:var(--mintFaint);margin-top:4px}
/* Race Track */
.race-wrap{background:var(--bgCard);border:1px solid var(--border);border-radius:12px;padding:clamp(16px,1.5vw,28px) clamp(20px,1.5vw,32px);margin-bottom:clamp(16px,1.5vw,28px)}
.race-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:clamp(12px,1vw,20px)}
.race-title{font-size:clamp(9px,0.65vw,12px);text-transform:uppercase;letter-spacing:2.5px;font-weight:700;color:var(--accent)}
.race-dates{font-size:clamp(9px,0.7vw,12px);color:var(--mintFaint)}
.race-lane{display:flex;align-items:center;margin-bottom:clamp(10px,0.8vw,16px);position:relative;gap:8px}
.race-lane:last-child{margin-bottom:0}
.race-label{width:clamp(120px,10vw,200px);flex-shrink:0;display:flex;align-items:center;gap:8px}
.race-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--bg);flex-shrink:0}
.race-label-text{font-size:clamp(10px,0.8vw,14px);font-weight:600;color:var(--mint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.race-label-sub{font-size:clamp(8px,0.6vw,11px);color:var(--mintFaint);font-weight:400}
.race-track-bg{flex:1;height:clamp(24px,2vw,36px);background:var(--bg);border-radius:14px;position:relative;overflow:hidden;border:1px solid var(--border)}
.race-track-fill{height:100%;border-radius:14px;transition:width 0.6s ease;position:relative;display:flex;align-items:center;justify-content:flex-end;padding-right:clamp(8px,0.6vw,14px);min-width:36px}
.race-track-pts{font-size:clamp(9px,0.7vw,12px);font-weight:800;color:var(--bg);white-space:nowrap}
.race-marker{position:absolute;top:50%;transform:translateY(-50%);width:1px;height:18px;background:var(--border)}
.race-marker-label{position:absolute;top:-14px;font-size:8px;color:var(--mintFaint);transform:translateX(-50%);white-space:nowrap}
/* IR Toggle */
.ir-toggle{padding:clamp(2px,0.2vw,5px) clamp(6px,0.5vw,10px);font-size:clamp(8px,0.6vw,11px);font-weight:700;text-transform:uppercase;letter-spacing:1px;border-radius:4px;cursor:pointer;border:1px solid;font-family:inherit;transition:all 0.2s}
.ir-toggle.pending{background:var(--amberDim);color:var(--amberText);border-color:rgba(245,158,11,0.3)}
.ir-toggle.pending:hover{background:rgba(245,158,11,0.25)}
.ir-toggle.converted{background:var(--greenDim);color:var(--green);border-color:rgba(34,197,94,0.3);cursor:default}
/* Pending Points */
.pending-bar{background:var(--bgCard);border:1px solid var(--border);border-radius:8px;padding:clamp(8px,0.7vw,14px) clamp(12px,0.9vw,18px);margin-top:clamp(10px,0.8vw,16px)}
.pending-row{display:flex;justify-content:space-between;align-items:center;font-size:clamp(9px,0.7vw,12px);padding:3px 0}
.pending-label{color:var(--mintFaint);font-weight:500}
.pending-val{font-weight:700;font-family:'DM Serif Display',Georgia,serif}
.pending-val.locked{color:var(--amberText)}
.pending-val.ready{color:var(--green)}
/* Autocomplete */
.ac-wrap{position:relative;flex:2;min-width:0}
.ac-wrap .inp{width:100%}
.ac-list{position:absolute;top:100%;left:0;right:0;background:var(--bgCard);border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;max-height:200px;overflow-y:auto;z-index:50;display:none}
.ac-list.show{display:block}
.ac-item{padding:8px 12px;font-size:12px;color:var(--mintDim);cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.15s}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.active{background:var(--borderLight);color:var(--mint)}
.ac-item em{font-style:normal;color:var(--accent);font-weight:700}
/* Flatpickr overrides */
.flatpickr-calendar{background:var(--bgCard)!important;border:1px solid var(--border)!important;box-shadow:0 8px 24px rgba(0,0,0,0.4)!important;font-family:'DM Sans',system-ui,sans-serif!important}
.flatpickr-day{color:var(--mint)!important;border-radius:6px!important}
.flatpickr-day.selected{background:var(--accent)!important;border-color:var(--accent)!important;color:var(--bg)!important}
.flatpickr-day:hover{background:var(--borderLight)!important}
.flatpickr-day.today{border-color:var(--accent)!important}
.flatpickr-months .flatpickr-month{color:var(--mint)!important;fill:var(--mint)!important}
.flatpickr-current-month .flatpickr-monthDropdown-months{background:var(--bgInput)!important;color:var(--mint)!important}
.flatpickr-current-month input.cur-year{color:var(--mint)!important}
span.flatpickr-weekday{color:var(--mintFaint)!important;font-weight:600!important}
.flatpickr-day.flatpickr-disabled{color:var(--mintGhost)!important}
.flatpickr-months .flatpickr-prev-month,.flatpickr-months .flatpickr-next-month{fill:var(--mint)!important}
.flatpickr-months .flatpickr-prev-month svg,.flatpickr-months .flatpickr-next-month svg{fill:var(--mint)!important}
.numInputWrapper span{border-color:var(--border)!important}
.numInputWrapper span:hover{background:var(--borderLight)!important}
.numInputWrapper span svg{fill:var(--mint)!important}
</style>
</head>
<body>
<div class="header">
  <div><div class="header-brand">Maybern Sales</div><div class="header-title serif">April Pipeline Blitz</div></div>
  <div class="header-right">
    <div style="text-align:right">
      <div style="display:flex;align-items:center;gap:6px;justify-content:flex-end"><span class="phase-dot" id="phaseDot"></span><span id="phaseLabel" style="font-size:11px;font-weight:600"></span></div>
      <div id="phaseInfo" style="font-size:10px;color:var(--mintFaint);margin-top:2px"></div>
    </div>
    <button onclick="exportExcel()" class="hdr-btn" style="background:var(--greenDim);color:var(--green);border-color:rgba(34,197,94,0.25)">Export</button>
    <span id="adminBtnWrap"></span>
  </div>
</div>
<div class="timeline-wrap"><div class="timeline" id="timeline"></div></div>
<div class="container">
  <div class="kpi-strip" id="kpiStrip"></div>
  <div id="raceTrack"></div>
  <div id="formArea"></div>
  <div class="tabs" id="tabs"></div>
  <div id="tabContent"></div>
</div>
<div id="modalArea"></div>

<script>
/* ══════ ADMIN AUTH ══════ */
function hashPw(pw){let h=0;for(let i=0;i<pw.length;i++){h=((h<<5)-h+pw.charCodeAt(i))|0}return Math.abs(h).toString(16)}
const CORRECT_HASH=hashPw("April Blitz 2026");
function isAdmin(){return sessionStorage.getItem("blitz-admin")==="1"}
function setAdmin(v){sessionStorage.setItem("blitz-admin",v?"1":"0")}
function showLoginModal(){
  document.getElementById("modalArea").innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><h3>🔒 Admin Login</h3><input type="password" class="inp" id="pwInput" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')attemptLogin()" autofocus><div id="pwError" style="color:var(--redText);font-size:11px;margin-bottom:12px;display:none">Incorrect password.</div><div class="modal-btns"><button class="hdr-btn" style="background:transparent;color:var(--mintDim);border-color:var(--border)" onclick="closeModal()">Cancel</button><button class="btn-add" onclick="attemptLogin()">Login</button></div></div></div>`;
  setTimeout(()=>document.getElementById("pwInput")?.focus(),50);
}
function attemptLogin(){
  if(hashPw(document.getElementById("pwInput").value)===CORRECT_HASH){setAdmin(true);closeModal();render()}
  else{document.getElementById("pwError").style.display="block";document.getElementById("pwInput").value="";document.getElementById("pwInput").focus()}
}
function adminLogout(){setAdmin(false);if(activeTab==="settings")activeTab="overview";render()}
function closeModal(){document.getElementById("modalArea").innerHTML=""}
function renderAdminBtn(){
  const el=document.getElementById("adminBtnWrap");
  el.innerHTML=isAdmin()
    ?`<button class="hdr-btn" style="background:var(--redDim);color:var(--redText);border-color:rgba(239,68,68,0.25)" onclick="resetAll()">Reset</button><button class="hdr-btn" style="background:var(--amberDim);color:var(--amberText);border-color:rgba(245,158,11,0.25);margin-left:4px" onclick="adminLogout()">🔓 Logout</button>`
    :`<button class="hdr-btn" style="background:var(--mintGhost);color:var(--mintDim);border-color:var(--border)" onclick="showLoginModal()">🔒 Admin</button>`;
}

/* ══════ CONFIG ══════ */
const SDRS=["Alex Gow","Steph Hulme"];
const TEAMS=[
  {name:"Team 1",members:[{name:"Gabrielle Everett",tag:"Vet"},{name:"Asaf Gavrieli",tag:"Ramp"}]},
  {name:"Team 2",members:[{name:"Bryan Champ",tag:"Vet"},{name:"Chris Khouri",tag:"Ramp"}]},
  {name:"Team 3",members:[{name:"Brad Bridwell",tag:"Ramp"},{name:"Will Allen",tag:"Ramp"}]}
];
const ALL_REPS=[...SDRS,...TEAMS.flatMap(t=>t.members.map(m=>m.name))];

/* ══════ CALC ENGINE ══════ */
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function calcPts(m){
  if(m.status!=="Qualified")return 0;
  let pts=0;
  if(m.meetingType==="IR")pts=m.irConverted?settings.irConvertedPts:0;
  else if(m.meetingType==="M4")pts=settings.m4Multiplier;
  else if(m.meetingType==="M3")pts=settings.m3Multiplier;
  else if(m.meetingType==="M2"||m.meetingType==="M2+")pts=settings.m2Multiplier;
  else pts=settings.m1Pts;
  if(m.ndaSigned)pts+=settings.ndaBonus;
  return pts;
}
function fmt(n){return n%1===0?n.toString():n.toFixed(1)}
function calcSDR(name){
  const qual=meetings.filter(m=>m.bookedBy===name&&m.status==="Qualified");
  const pend=meetings.filter(m=>m.bookedBy===name&&m.status==="Pending");
  let pts=0;qual.forEach(m=>pts+=calcPts(m));
  let pendPts=0;pend.forEach(m=>{let p=0;if(m.meetingType==="M4")p=settings.m4Multiplier;else if(m.meetingType==="M3")p=settings.m3Multiplier;else if(m.meetingType==="M2"||m.meetingType==="M2+")p=settings.m2Multiplier;else if(m.meetingType==="IR")p=0;else p=settings.m1Pts;if(m.ndaSigned)p+=settings.ndaBonus;pendPts+=p});
  const irPending=qual.filter(m=>m.meetingType==="IR"&&!m.irConverted).length;
  const irPendPts=irPending*settings.irConvertedPts;
  const countable=qual.filter(m=>m.meetingType!=="IR"||m.irConverted).length;
  const gate=countable>=settings.sdrGate,floored=Math.floor(pts),sets=Math.floor(floored/5);
  const gatePts=!gate?pts:0;
  return{name,pts,countable,gate,sets,payout:gate?sets*settings.sdrBonusPer5:0,nextSet:gate?(sets+1)*5-floored:settings.sdrGate-countable,pendPts,irPendPts,irPending,gatePts,pendCount:pend.length};
}
function teamDisplayName(idx){return(settings.teamNames&&settings.teamNames[idx])||TEAMS[idx].name}

function calcTeam(team,idx){
  const ms=team.members.map(mem=>{
    const mine=meetings.filter(m=>m.bookedBy===mem.name&&m.status==="Qualified");
    const pend=meetings.filter(m=>m.bookedBy===mem.name&&m.status==="Pending");
    let pts=0;mine.forEach(m=>pts+=calcPts(m));
    let pendPts=0;pend.forEach(m=>{let p=0;if(m.meetingType==="M4")p=settings.m4Multiplier;else if(m.meetingType==="M3")p=settings.m3Multiplier;else if(m.meetingType==="M2"||m.meetingType==="M2+")p=settings.m2Multiplier;else if(m.meetingType==="IR")p=0;else p=settings.m1Pts;if(m.ndaSigned)p+=settings.ndaBonus;pendPts+=p});
    const irPending=mine.filter(m=>m.meetingType==="IR"&&!m.irConverted).length;
    return{...mem,pts,meetings:mine.length,pendPts,pendCount:pend.length,irPending};
  });
  const teamPts=ms.reduce((s,m)=>s+m.pts,0),teamMeetings=ms.reduce((s,m)=>s+m.meetings,0),gate=teamMeetings>=settings.aeGate;
  const teamPend=ms.reduce((s,m)=>s+m.pendPts,0),teamIrPend=ms.reduce((s,m)=>s+m.irPending,0);
  let balance=true;if(teamMeetings>0)balance=Math.max(...ms.map(m=>m.meetings))/teamMeetings<=settings.balanceMax/100;
  return{name:teamDisplayName(idx),origName:team.name,members:ms,teamPts,teamMeetings,gate,balance,eligible:gate&&balance,teamPend,teamIrPend};
}

function renderRaceTrack(){
  const teamResults=TEAMS.map((t,i)=>{const tc=calcTeam(t,i);return{...tc,type:"ae",origIdx:i}});
  const sdrResults=SDRS.map((n,i)=>{const sc=calcSDR(n);return{...sc,type:"sdr",origIdx:i}});

  // Sort each group by confirmed points descending
  teamResults.sort((a,b)=>b.teamPts-a.teamPts);
  sdrResults.sort((a,b)=>b.pts-a.pts);

  const aeColors=["#22C55E","#6ECBA0","#3B82F6"];
  const sdrColors=["#E879F9","#FB923C"];
  const placeIcons=["🥇","🥈","🥉"];
  const sdrPlaceIcons=["🥇","🥈"];

  // Track scale: include pending in max so yellow bars fit
  const allConfirmed=[...teamResults.map(t=>t.teamPts),...sdrResults.map(s=>s.pts)];
  const allWithPend=[...teamResults.map(t=>t.teamPts+t.teamPend+t.teamIrPend*settings.irConvertedPts),...sdrResults.map(s=>s.pts+s.pendPts+s.irPendPts)];
  const trackMax=Math.max(Math.max(...allWithPend)*1.2,10);

  // Day progress
  const now=new Date(),start=new Date("2026-04-01");
  const totalDays=29,daysPassed=Math.max(0,Math.min(totalDays,Math.floor((now-start)/86400000)));
  const dayPct=Math.min(daysPassed/totalDays*100,100);
  const dayLabel=daysPassed>0&&daysPassed<totalDays?`Day ${daysPassed}`:"";

  // Gate marker position — raw meeting count (not points)
  const aeGatePct=Math.min(settings.aeGate/trackMax*100,100);
  const sdrGatePct=Math.min(settings.sdrGate/trackMax*100,100);

  const gateMarker=`<div style="position:absolute;left:${aeGatePct}%;top:0;bottom:0;width:2px;background:var(--red);z-index:3;opacity:0.7"></div><div style="position:absolute;left:${aeGatePct}%;top:-16px;transform:translateX(-50%);font-size:clamp(7px,0.5vw,9px);color:var(--redText);font-weight:700;white-space:nowrap;z-index:3">⛳ ${settings.aeGate} min</div>`;
  const sdrGateMarker=`<div style="position:absolute;left:${sdrGatePct}%;top:0;bottom:0;width:2px;background:var(--red);z-index:3;opacity:0.7"></div><div style="position:absolute;left:${sdrGatePct}%;top:-16px;transform:translateX(-50%);font-size:clamp(7px,0.5vw,9px);color:var(--redText);font-weight:700;white-space:nowrap;z-index:3">⛳ ${settings.sdrGate} min</div>`;

  // Build AE lanes sorted by rank
  const aeLanes=teamResults.map((t,rank)=>{
    const confirmed=t.teamPts;
    const pending=t.teamPend+t.teamIrPend*settings.irConvertedPts;
    const confPct=Math.min(confirmed/trackMax*100,100);
    const pendPct=Math.min(pending/trackMax*100,100);
    const color=aeColors[rank]||aeColors[0];
    const memberNames=t.members.map(m=>m.name.split(" ")[0]).join(" & ");
    const icon=placeIcons[rank]||"🏁";
    const pastGate=t.teamMeetings>=settings.aeGate;
    const pendLabel=pending>0?`<span style="font-size:9px;color:var(--amberText);margin-left:8px;font-weight:600">+${fmt(pending)} pending</span>`:"";
    return`<div class="race-lane" style="transition:all 0.3s">
      <div class="race-label">
        <div style="font-size:18px;width:28px;text-align:center;flex-shrink:0">${icon}</div>
        <div><div class="race-label-text">${t.name}</div><div class="race-label-sub">${memberNames}</div></div>
      </div>
      <div class="race-track-bg">
        ${rank===0?gateMarker:""}
        <div style="position:absolute;left:${aeGatePct}%;top:0;bottom:0;width:2px;background:${pastGate?'var(--green)':'var(--red)'};z-index:3;opacity:${rank===0?0:0.5}"></div>
        <div style="position:absolute;left:${dayPct}%;top:50%;transform:translateY(-50%);width:1px;height:20px;background:var(--mintGhost);z-index:2"></div>
        ${pending>0?`<div style="position:absolute;left:0;top:0;height:100%;width:${Math.max(confPct+pendPct,4)}%;background:repeating-linear-gradient(45deg,rgba(245,158,11,0.25),rgba(245,158,11,0.25) 4px,rgba(245,158,11,0.1) 4px,rgba(245,158,11,0.1) 8px);border-radius:14px;transition:width 0.6s"></div>`:""}
        <div class="race-track-fill" style="width:${Math.max(confPct,4)}%;background:${color};z-index:1;position:relative"><span class="race-track-pts">${fmt(confirmed)}</span></div>
      </div>
      ${pendLabel}
    </div>`;
  }).join("");

  // Build SDR lanes sorted by rank
  const sdrLanes=sdrResults.map((s,rank)=>{
    const confirmed=s.pts;
    const pending=s.pendPts+s.irPendPts;
    const confPct=Math.min(confirmed/trackMax*100,100);
    const pendPct=Math.min(pending/trackMax*100,100);
    const color=sdrColors[rank]||sdrColors[0];

    return`<div class="race-lane" style="transition:all 0.3s">
      <div class="race-label">
        <div style="font-size:18px;width:28px;text-align:center;flex-shrink:0">${icon}</div>
        <div><div class="race-label-text">${s.name}</div><div class="race-label-sub">SDR · ${s.countable} meetings</div></div>
      </div>
      <div class="race-track-bg">
        ${rank===0?sdrGateMarker:""}
        <div style="position:absolute;left:${sdrGatePct}%;top:0;bottom:0;width:2px;background:${pastGate?'var(--green)':'var(--red)'};z-index:3;opacity:${rank===0?0:0.5}"></div>
        <div style="position:absolute;left:${dayPct}%;top:50%;transform:translateY(-50%);width:1px;height:20px;background:var(--mintGhost);z-index:2"></div>
        ${pending>0?`<div style="position:absolute;left:0;top:0;height:100%;width:${Math.max(confPct+pendPct,4)}%;background:repeating-linear-gradient(45deg,rgba(245,158,11,0.25),rgba(245,158,11,0.25) 4px,rgba(245,158,11,0.1) 4px,rgba(245,158,11,0.1) 8px);border-radius:14px;transition:width 0.6s"></div>`:""}
        <div class="race-track-fill" style="width:${Math.max(confPct,4)}%;background:${color};z-index:1;position:relative"><span class="race-track-pts">${fmt(confirmed)}</span></div>
      </div>
      ${pendLabel}
    </div>`;
  }).join("");

  document.getElementById("raceTrack").innerHTML=`
    <div class="race-wrap">
      <div class="race-header">
        <div class="race-title">Pipeline Race</div>
        <div class="race-dates">
          <span style="color:var(--mint);font-weight:600">Apr 1</span>
          <span style="margin:0 6px">→</span>
          ${dayLabel?`<span style="color:var(--amberText);font-weight:600;margin-right:6px">${dayLabel}</span><span style="margin-right:6px">→</span>`:""}
          <span style="color:var(--mint);font-weight:600">Apr 30</span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
        <div style="font-size:9px;text-transform:uppercase;letter-spacing:2px;font-weight:600;color:var(--mintFaint)">AE Teams</div>
        <div style="display:flex;align-items:center;gap:6px;margin-left:auto">
          <div style="width:12px;height:6px;border-radius:3px;background:var(--accent)"></div><span style="font-size:9px;color:var(--mintFaint)">Confirmed</span>
          <div style="width:12px;height:6px;border-radius:3px;background:repeating-linear-gradient(45deg,rgba(245,158,11,0.4),rgba(245,158,11,0.4) 2px,rgba(245,158,11,0.15) 2px,rgba(245,158,11,0.15) 4px)"></div><span style="font-size:9px;color:var(--mintFaint)">Pending</span>

        </div>
      </div>
      ${aeLanes}
      <div style="height:1px;background:var(--border);margin:14px 0"></div>
      <div style="font-size:9px;text-transform:uppercase;letter-spacing:2px;font-weight:600;color:var(--mintFaint);margin-bottom:8px">SDRs</div>
      ${sdrLanes}
    </div>`;
}

function renderSDR(){
  return`<div class="sdr-row">${SDRS.map((n,si)=>{const s=calcSDR(n),gc=s.gate?"var(--green)":"var(--amber)",gb=s.gate?badge("Gate Hit ✓","#166534","var(--greenDim)"):badge(`${s.countable}/${settings.sdrGate} to gate`,"var(--redText)","var(--redDim)"),pc=s.payout>0?"var(--green)":"var(--mintFaint)";
    const sp=settings.sdrPipeline&&settings.sdrPipeline[si]?settings.sdrPipeline[si]:0;
    const pipeTag=sp>0?`<div style="font-size:10px;color:var(--green);font-weight:600;margin-top:6px;text-align:center">$${sp.toLocaleString()} pipeline generated</div>`:"";
    const hint=s.gate?`<div class="sdr-hint" style="background:var(--amberDim);color:var(--amberText)">${s.nextSet} more point${s.nextSet!==1?"s":""} to next $${settings.sdrBonusPer5.toLocaleString()}</div>`:`<div class="sdr-hint" style="background:var(--amberDim);color:var(--amberText)">${settings.sdrGate-s.countable} more meeting${settings.sdrGate-s.countable!==1?"s":""} to activate bonus</div>`;
    return`<div class="sdr-card"><div class="sdr-head"><span class="sdr-name serif">${s.name}</span>${gb}</div><div class="sdr-body">
      <div class="sdr-stats"><div><div class="stat-label">Meetings</div><div class="stat-val serif">${s.countable}</div></div><div><div class="stat-label">Points</div><div class="stat-val serif">${fmt(s.pts)}</div></div><div><div class="stat-label">Payout</div><div class="stat-val serif" style="color:${pc}">$${s.payout.toLocaleString()}</div></div></div>

function renderAE(){

    const stCell=admin

  // Velocity forecast
  const now=new Date(),start=new Date("2026-04-01"),end=new Date("2026-04-30");
  const daysPassed=Math.max(1,Math.floor((now-start)/86400000));

    <div style="display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap">
      ${TEAMS.map((t,i)=>{const dn=teamDisplayName(i),val=settings.teamPipeline&&settings.teamPipeline[i]?settings.teamPipeline[i]:0;
        return`<div class="setting-card" style="flex:1;min-width:180px"><label>${dn} Pipeline</label><div style="display:flex;align-items:center;gap:4px"><span style="color:var(--mintFaint);font-size:14px;font-weight:600">$</span><input class="inp" type="number" step="1000" min="0" value="${val}" onchange="updatePipeline('team',${i},parseInt(this.value)||0)" style="flex:1"></div></div>`;
      }).join("")}
      ${SDRS.map((n,i)=>{const val=settings.sdrPipeline&&settings.sdrPipeline[i]?settings.sdrPipeline[i]:0;
        return`<div class="setting-card" style="flex:1;min-width:180px"><label>${n} Pipeline</label><div style="display:flex;align-items:center;gap:4px"><span style="color:var(--mintFaint);font-size:14px;font-weight:600">$</span><input class="inp" type="number" step="1000" min="0" value="${val}" onchange="updatePipeline('sdr',${i},parseInt(this.value)||0)" style="flex:1"></div></div>`;
      }).join("")}
    </div>`;

  return budgetHtml+pipelineHtml+tableHtml;
}

function updatePipeline(type,idx,val){
  if(type==='team'){if(!settings.teamPipeline)settings.teamPipeline=[0,0,0];settings.teamPipeline[idx]=val;settings.pipelineTotal=settings.teamPipeline.reduce((s,v)=>s+v,0)+(settings.sdrPipeline||[0,0]).reduce((s,v)=>s+v,0);}
  else{if(!settings.sdrPipeline)settings.sdrPipeline=[0,0];settings.sdrPipeline[idx]=val;settings.pipelineTotal=(settings.teamPipeline||[0,0,0]).reduce((s,v)=>s+v,0)+settings.sdrPipeline.reduce((s,v)=>s+v,0);}
  saveSettings();render();
}

function adminEditField(id,field,value){
  const m=meetings.find(m=>m.id===id);
  if(!m||!isAdmin())return;
  if(field==='irConverted'||field==='ndaSigned')m[field]=!!value;
  else m[field]=value;
  saveData();render();
}

function adminDeleteMeeting(id){
  if(!isAdmin())return;
  document.getElementById("modalArea").innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><h3>⚠️ Delete Meeting</h3><p style="font-size:13px;color:var(--mintDim);margin-bottom:16px">Are you sure you want to delete this meeting?</p><div class="modal-btns"><button class="hdr-btn" style="background:transparent;color:var(--mintDim);border-color:var(--border)" onclick="closeModal()">Cancel</button><button class="hdr-btn" style="background:var(--redDim);color:var(--redText);border-color:rgba(239,68,68,0.4)" onclick="confirmDeleteMeeting('${id}')">Yes, Delete</button></div></div></div>`;
}
function confirmDeleteMeeting(id){meetings=meetings.filter(m=>m.id!==id);saveData();closeModal();render()}

/* ══════ TABS ══════ */
function renderTabs(){
  const tabs=[["overview","Overview"],["ae","AE Leaderboard"],["sdr","SDR Leaderboard"],["log",`Meeting Log (${meetings.length})`]];
  if(isAdmin()){tabs.push(["admin","📊 Admin Portal"]);tabs.push(["settings","⚙ Settings"]);}
  document.getElementById("tabs").innerHTML=tabs.map(([k,l])=>`<button class="tab${activeTab===k?" active":""}" onclick="switchTab('${k}')">${l}</button>`).join("");
}
function switchTab(t){activeTab=t;logFilter="all";render()}
function renderLogTab(f){logFilter=f;document.getElementById("tabContent").innerHTML=renderLog(f)}
function renderTabContent(){
  const el=document.getElementById("tabContent");
  if(activeTab==="overview")el.innerHTML=`<div class="sec-label">AE Team Competition</div>${renderAE()}<div class="sec-label" style="margin-top:28px">SDR Individual Bonus</div>${renderSDR()}`;
  else if(activeTab==="sdr")el.innerHTML=renderSDR();
  else if(activeTab==="ae")el.innerHTML=renderAE();
  else if(activeTab==="log")el.innerHTML=renderLog(logFilter);
  else if(activeTab==="admin")el.innerHTML=renderAdminPortal();
  else if(activeTab==="settings")el.innerHTML=renderSettings();
}

/* ══════ AUTOCOMPLETE ══════ */
let acIdx=-1;
function getUniqueFirms(){return[...new Set(meetings.map(m=>m.firm).filter(Boolean))].sort()}
function acFilter(){
  const input=document.getElementById("fFirm"),list=document.getElementById("acList");
  if(!input||!list)return;
  const val=input.value.trim().toLowerCase();
  if(!val){list.classList.remove("show");list.innerHTML="";acIdx=-1;return}
  const firms=getUniqueFirms().filter(f=>f.toLowerCase().includes(val));
  if(firms.length===0||firms.length===1&&firms[0].toLowerCase()===val){list.classList.remove("show");list.innerHTML="";acIdx=-1;return}
  acIdx=-1;
  list.innerHTML=firms.map((f,i)=>{
    const idx=f.toLowerCase().indexOf(val);
    const highlighted=f.slice(0,idx)+`<em>${f.slice(idx,idx+val.length)}</em>`+f.slice(idx+val.length);
    return`<div class="ac-item" data-idx="${i}" onmousedown="acSelect('${f.replace(/'/g,"\\'")}')">${highlighted}</div>`;
  }).join("");
  list.classList.add("show");
}
function acSelect(firm){
  const input=document.getElementById("fFirm"),list=document.getElementById("acList");
  input.value=firm;
  list.classList.remove("show");list.innerHTML="";acIdx=-1;
  // Auto-set meeting type based on existing meetings at this firm
  const existing=meetings.filter(m=>m.firm.toLowerCase()===firm.toLowerCase());
  if(existing.length>0){const typeEl=document.getElementById("fType");if(typeEl){const hasM3=existing.some(m=>m.meetingType==="M3"||m.meetingType==="M4");const hasM2=existing.some(m=>m.meetingType==="M2"||m.meetingType==="M2+");typeEl.value=hasM3?"M4":hasM2?"M3":"M2";document.getElementById('ndaWrap').style.display='flex'}}
  input.focus();
}
function acKeydown(event){
  const list=document.getElementById("acList"),items=list.querySelectorAll(".ac-item");
  if(!items.length){if(event.key==="Enter")addMeeting();return}
  if(event.key==="ArrowDown"){event.preventDefault();acIdx=Math.min(acIdx+1,items.length-1);acHighlight(items)}
  else if(event.key==="ArrowUp"){event.preventDefault();acIdx=Math.max(acIdx-1,-1);acHighlight(items)}
  else if(event.key==="Enter"){event.preventDefault();if(acIdx>=0&&items[acIdx]){const firm=items[acIdx].textContent;acSelect(firm)}else{list.classList.remove("show");addMeeting()}}
  else if(event.key==="Escape"){list.classList.remove("show");acIdx=-1}
}
function acHighlight(items){items.forEach((el,i)=>{el.classList.toggle("active",i===acIdx)})}
// Close autocomplete when clicking outside
document.addEventListener("click",function(e){
  const list=document.getElementById("acList");
  if(list&&!e.target.closest(".ac-wrap"))list.classList.remove("show");
});

/* ══════ ACTIONS ══════ */
function addMeeting(){
  const firm=document.getElementById("fFirm").value.trim();if(!firm)return;
  const db=fpBooked?fpBooked.input.value:"",ds=fpScheduled?fpScheduled.input.value:"";
  const admin=isAdmin();
  // Date validation (safety net beyond flatpickr constraints)
  if(!admin){
    if(db&&(db<"2026-04-01"||db>"2026-04-30")){alert("Date Booked must be within April 1–30, 2026.");return}
    const today=new Date().toISOString().split("T")[0];
    if(ds&&ds<today){alert("Date Scheduled cannot be in the past.");return}
    if(ds&&ds>"2026-05-14"){alert("Date Scheduled cannot be after May 14, 2026 (acceptance deadline).");return}
  }
  // NDA validation: must be tied to firm with existing April meetings
  const ndaChecked=document.getElementById("fNdaSigned")?.checked||false;
  const meetingType=document.getElementById("fType").value;
  if(ndaChecked){
    if(!["M2","M3","M4"].includes(meetingType)){alert("NDA bonus only applies to M2, M3, or M4 meetings.");return}
    const aprilFirmMeetings=meetings.filter(x=>x.firm.toLowerCase()===firm.toLowerCase()&&(x.dateBooked||x.date)>="2026-04-01");
    if(aprilFirmMeetings.length===0){alert("NDA bonus requires the firm to already have meetings booked on or after April 1st. Book the M1 first.");return}
  }
  meetings.push({id:uid(),bookedBy:document.getElementById("fBookedBy").value,firm,persona:document.getElementById("fPersona").value,meetingType:meetingType,dateBooked:db,dateScheduled:ds,status:document.getElementById("fStatus").value,irConverted:document.getElementById("fIrConverted")?.checked||false,ndaSigned:ndaChecked});
  saveData();render();
}
function convertIR(id){const m=meetings.find(m=>m.id===id);if(m&&m.meetingType==="IR"&&!m.irConverted){m.irConverted=true;saveData();render()}}
function confirmMeeting(id){const m=meetings.find(m=>m.id===id);if(m&&m.status==="Pending"){m.status="Qualified";saveData();render()}}
function markNDA(id){
  const m=meetings.find(m=>m.id===id);
  if(!m||m.ndaSigned)return;
  // Validate: firm must have meetings booked on/after April 1
  const aprilMeetings=meetings.filter(x=>x.firm.toLowerCase()===m.firm.toLowerCase()&&x.status==="Qualified"&&(x.dateBooked||x.date)>="2026-04-01");
  if(aprilMeetings.length===0){alert("NDA bonus only applies to firms with meetings booked on or after April 1st.");return}
  // Must be M2+ meeting
  if(!["M2","M3","M4","M2+"].includes(m.meetingType)){alert("NDA bonus only applies to M2, M3, or M4 meetings.");return}
  m.ndaSigned=true;saveData();render();
}
function updateStatus(id,status){if(!isAdmin())return;const m=meetings.find(m=>m.id===id);if(m){m.status=status;saveData();render()}}
function deleteMeeting(id){if(!isAdmin())return;meetings=meetings.filter(m=>m.id!==id);saveData();render()}
function resetAll(){
  if(!isAdmin())return;
  document.getElementById("modalArea").innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><h3>⚠️ Reset All Data</h3><p style="font-size:13px;color:var(--mintDim);margin-bottom:16px">This will permanently delete all meeting data. This cannot be undone.</p><div class="modal-btns"><button class="hdr-btn" style="background:transparent;color:var(--mintDim);border-color:var(--border)" onclick="closeModal()">Cancel</button><button class="hdr-btn" style="background:var(--redDim);color:var(--redText);border-color:rgba(239,68,68,0.4)" onclick="confirmReset()">Yes, Reset Everything</button></div></div></div>`;
}
function confirmReset(){meetings=[];saveData();closeModal();render()}

/* ══════ EXPORT ══════ */
function exportExcel(){
  if(meetings.length===0){alert("No meetings to export.");return}
  const lh=["Date Booked","Date Scheduled","Rep","Firm","Persona","Meeting Type","Points","NDA Signed","Status","IR Converted","Role"];
  const lr=[...meetings].sort((a,b)=>new Date(a.dateBooked||a.date)-new Date(b.dateBooked||b.date)).map(m=>{const isSDR=SDRS.includes(m.bookedBy);let team="";if(!isSDR){const ti=TEAMS.findIndex(t=>t.members.some(mem=>mem.name===m.bookedBy));team=ti>=0?teamDisplayName(ti):""}return[m.dateBooked||m.date||"",m.dateScheduled||"",m.bookedBy,m.firm,m.persona,m.meetingType,calcPts(m),m.ndaSigned?"Yes":"No",m.status,m.meetingType==="IR"?(m.irConverted?"Yes":"No"):"",isSDR?"SDR":`AE (${team})`]});
  const sh=["SDR","Qualified Meetings","Points","Gate Hit","Sets of 5","Payout"],sr=SDRS.map(n=>{const s=calcSDR(n);return[n,s.countable,s.pts,s.gate?"Yes":"No",s.sets,s.payout]});
  const ah=["Team","Member","Tag","Meetings","Points","Mtg Share %","Gate Hit","Balance Pass","Eligible","Team Total"],ar=[];
  TEAMS.forEach((t,ti)=>{const tc=calcTeam(t,ti);tc.members.forEach((m,i)=>{const sh2=tc.teamMeetings>0?(m.meetings/tc.teamMeetings*100).toFixed(1):"0";ar.push([i===0?tc.name:"",m.name,m.tag,m.meetings,m.pts,sh2+"%",i===0?(tc.gate?"Yes":"No"):"",i===0?(tc.balance?"Yes":"No"):"",i===0?(tc.eligible?"Yes":"No"):"",i===0?tc.teamPts:""])})});
  const wb=XLSX.utils.book_new();
  const ws1=XLSX.utils.aoa_to_sheet([lh,...lr]);ws1["!cols"]=[{wch:12},{wch:12},{wch:20},{wch:28},{wch:10},{wch:10},{wch:7},{wch:10},{wch:12},{wch:12},{wch:14}];
  const ws2=XLSX.utils.aoa_to_sheet([sh,...sr]);ws2["!cols"]=[{wch:16},{wch:18},{wch:8},{wch:10},{wch:10},{wch:10}];
  const ws3=XLSX.utils.aoa_to_sheet([ah,...ar]);ws3["!cols"]=[{wch:10},{wch:20},{wch:6},{wch:10},{wch:8},{wch:10},{wch:10},{wch:12},{wch:10},{wch:12}];
  XLSX.utils.book_append_sheet(wb,ws1,"Meeting Log");XLSX.utils.book_append_sheet(wb,ws2,"SDR Leaderboard");XLSX.utils.book_append_sheet(wb,ws3,"AE Leaderboard");
  XLSX.writeFile(wb,`Pipeline_Blitz_${new Date().toISOString().split("T")[0]}.xlsx`);
}

/* ══════ MASTER RENDER ══════ */
function render(){renderAdminBtn();renderPhase();renderTimeline();renderKPIs();renderRaceTrack();renderForm();renderTabs();renderTabContent()}

/* ══════ INIT ══════ */
meetings=loadData();settings=loadSettings();render();
